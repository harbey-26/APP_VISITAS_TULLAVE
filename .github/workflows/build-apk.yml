name: Build Android APK

on:
  push:
    branches: [main]
    # Solo regenerar el APK cuando cambien archivos que afectan al binario nativo.
    # Los cambios en src/, server.js, prisma/, docs/ NO requieren reinstalar:
    # la app es un WebView que ya consume las nuevas versiones de Railway.
    paths:
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'assets/ic_*.png'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # permite ejecutar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    # Permite al workflow crear releases públicos con el APK como asset
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.pg.prisma

      - name: Build web app
        run: npm run build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_API_URL: https://tu-llave-visitas-e66b.up.railway.app

      - name: Add Android platform
        run: npx cap add android

      - name: Inject google-services.json
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Generate app icon (adaptive + legacy)
        run: |
          sudo apt-get install -y -q imagemagick
          RES="android/app/src/main/res"
          # densidad : tamaño_legacy : tamaño_adaptativo(108dp)
          for entry in "mdpi:48:108" "hdpi:72:162" "xhdpi:96:216" "xxhdpi:144:324" "xxxhdpi:192:432"; do
            D="${entry%%:*}"; rest="${entry#*:}"; LEG="${rest%%:*}"; ADP="${rest##*:}"
            DEST="$RES/mipmap-${D}"
            mkdir -p "$DEST"
            # Capas del ícono adaptativo (Android 8+): foreground (llave) + background (rojo)
            convert assets/ic_foreground.png -resize ${ADP}x${ADP} "$DEST/ic_launcher_foreground.png"
            convert assets/ic_background.png -resize ${ADP}x${ADP} "$DEST/ic_launcher_background.png"
            # Ícono heredado plano (Android < 8)
            convert assets/ic_legacy.png     -resize ${LEG}x${LEG} "$DEST/ic_launcher.png"
            cp "$DEST/ic_launcher.png" "$DEST/ic_launcher_round.png"
          done
          # XML del ícono adaptativo — referencia nuestras propias capas (reemplaza el de Capacitor)
          mkdir -p "$RES/mipmap-anydpi-v26"
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
            '    <background android:drawable="@mipmap/ic_launcher_background"/>' \
            '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' \
            '</adaptive-icon>' > "$RES/mipmap-anydpi-v26/ic_launcher.xml"
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"
          echo "Íconos generados:"; ls "$RES/mipmap-anydpi-v26" "$RES/mipmap-hdpi"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add SCHEDULE_EXACT_ALARM permission
        run: |
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n</manifest>|' android/app/src/main/AndroidManifest.xml

      # Inyecta la versión de package.json en build.gradle para que App.getInfo()
      # devuelva la misma versión que el backend compara. Sin esto, el APK siempre
      # reportaría "1.0" y el banner se quedaría pegado.
      - name: Inject app version into build.gradle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "App versionName=$VERSION versionCode=$VERSION_CODE"
          grep -E "version(Name|Code)" android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK (artifact interno)
        uses: actions/upload-artifact@v5
        with:
          name: VisitTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Leer la versión del package.json y renombrar el APK con ella, así el
      # release tiene un nombre estable y predecible.
      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cp android/app/build/outputs/apk/debug/app-debug.apk "VisitTrack-v${VERSION}.apk"

      # Crea (o actualiza) un release público con el APK como asset.
      # URL predecible: https://github.com/<owner>/<repo>/releases/download/v<version>/VisitTrack-v<version>.apk
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: VisitTrack v${{ steps.pkg.outputs.version }}
          body: |
            APK generado automáticamente.

            **Instalación:** descarga `VisitTrack-v${{ steps.pkg.outputs.version }}.apk` y ábrelo en el dispositivo Android.
            (Puede pedir permitir "Instalar apps de orígenes desconocidos" la primera vez.)
          files: VisitTrack-v${{ steps.pkg.outputs.version }}.apk
          # Si ya existe un release con esa tag, sobrescribe el asset (útil al re-correr el workflow)
          fail_on_unmatched_files: true
          make_latest: 'true'
