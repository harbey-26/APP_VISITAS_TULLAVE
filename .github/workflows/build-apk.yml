name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite ejecutar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.pg.prisma

      - name: Build web app
        run: npm run build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_API_URL: https://tu-llave-visitas-e66b.up.railway.app

      - name: Add Android platform
        run: npx cap add android

      - name: Generate custom app icon from logo
        run: |
          sudo apt-get install -y -q imagemagick
          LOGO="public/logo.png"
          BG="#e31c25"
          # formato "densidad:tamaño" — sin declare -A para compatibilidad con sh
          for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            DENSITY="${entry%%:*}"
            SIZE="${entry##*:}"
            LOGO_SIZE=$((SIZE * 70 / 100))
            DEST="android/app/src/main/res/mipmap-${DENSITY}"
            mkdir -p "$DEST"
            # Fondo rojo sólido + logo con transparencia conservada, centrado
            convert -size ${SIZE}x${SIZE} xc:"$BG" \
              \( "$LOGO" -resize ${LOGO_SIZE}x${LOGO_SIZE} -background none \) \
              -gravity center -composite -flatten \
              "$DEST/ic_launcher.png"
            cp "$DEST/ic_launcher.png" "$DEST/ic_launcher_round.png"
          done
          echo "Íconos generados:"
          ls android/app/src/main/res/mipmap-hdpi/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VisitTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
