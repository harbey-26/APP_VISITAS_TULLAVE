# CI ligero: lint + tests en cada push/PR a main.
# No compila APK (eso lo hace build-apk.yml solo cuando cambian archivos nativos)
# ni necesita base de datos: los tests cubren lógica pura (geofencing,
# conflictos de horario, helpers).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # --ignore-scripts evita el postinstall (prisma generate + build),
      # igual que en build-apk.yml
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
