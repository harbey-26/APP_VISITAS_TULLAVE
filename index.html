<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#e31c25" />
    <meta name="description" content="Gestión de visitas inmobiliarias de TuLlave: agenda digital, ejecución de visitas y reportes." />
    <link rel="manifest" href="/manifest.json" />
    <title>TuLlave — Visitas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* Splash inicial: visible al instante mientras carga el JS desde Railway.
           React reemplaza el contenido de #root al montar, así que se quita solo. */
        html, body { margin: 0; background: #e31c25; }
        #app-splash {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            background: #e31c25;
        }
        #app-splash img { width: 96px; height: auto; }
        #app-splash .spin {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.35);
            border-top-color: #fff; border-radius: 50%;
            animation: app-splash-spin 0.8s linear infinite;
        }
        @keyframes app-splash-spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div id="root">
        <div id="app-splash">
            <img src="/logo.png" alt="TuLlave" />
            <div class="spin"></div>
        </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
